<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <g filter="url(#glow)">
    <!-- Estrella abstracta para "Magia" -->
    <path d="M256 60 C256 190 190 256 60 256 C190 256 256 322 256 452 C256 322 322 256 452 256 C322 256 256 190 256 60 Z" 
          fill="url(#neonGradient)" opacity="0.9" />
    
    <!-- Anillo planetario para "Mundana" -->
    <ellipse cx="256" cy="256" rx="200" ry="70" transform="rotate(-25 256 256)" 
             fill="none" stroke="url(#neonGradient)" stroke-width="20" opacity="0.8" />
             
    <!-- Núcleo brillante -->
    <circle cx="256" cy="256" r="45" fill="#ffffff" opacity="0.95" />
  </g>
</svg>
